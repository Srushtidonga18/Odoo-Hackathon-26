<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AssetFlow - Create Workspace Account</title>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <!-- SweetAlert2 -->
  <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-bootstrap-4/bootstrap-4.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="auth-wrapper">
    <div class="auth-card" style="max-width: 520px;">
      <div class="text-center mb-4">
        <a href="../index.html" class="text-decoration-none d-inline-flex align-items-center mb-3">
          <i class="fa-solid fa-cube text-primary fs-2 me-2"></i>
          <span class="fs-3 fw-bold text-dark">AssetFlow</span>
        </a>
        <h4 class="fw-bold">Create Your Workspace</h4>
        <p class="text-muted">Register an enterprise administrator account</p>
      </div>

      <form id="signup-form" novalidate>
        <!-- Full Name -->
        <div class="mb-3">
          <label for="fullname" class="form-label-custom">Full Name</label>
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0" style="border-radius: var(--border-radius-sm) 0 0 var(--border-radius-sm); border: 1px solid var(--border-color);"><i class="fa-solid fa-user text-muted"></i></span>
            <input type="text" id="fullname" class="form-control form-control-custom border-start-0 ps-1" placeholder="Rahul Sharma" required style="border-radius: 0 var(--border-radius-sm) var(--border-radius-sm) 0;">
          </div>
          <div class="invalid-feedback d-block mt-1" id="fullname-error"></div>
        </div>

        <!-- Department Selection -->
        <div class="mb-3" id="department-wrapper">
          <label for="department" class="form-label-custom">Department</label>
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0" style="border-radius: var(--border-radius-sm) 0 0 var(--border-radius-sm); border: 1px solid var(--border-color);"><i class="fa-solid fa-sitemap text-muted"></i></span>
            <select id="department" class="form-select form-control-custom border-start-0 ps-1" style="border-radius: 0 var(--border-radius-sm) var(--border-radius-sm) 0;">
              <option value="IT">IT & Infrastructure</option>
              <option value="Engineering">Engineering</option>
              <option value="Human Resources">Human Resources</option>
              <option value="Marketing">Marketing</option>
              <option value="Finance">Finance</option>
            </select>
          </div>
          <div class="invalid-feedback d-block mt-1" id="department-error"></div>
        </div>

        <!-- Email Address -->
        <div class="mb-3">
          <label for="email" class="form-label-custom">Email Address</label>
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0" style="border-radius: var(--border-radius-sm) 0 0 var(--border-radius-sm); border: 1px solid var(--border-color);"><i class="fa-solid fa-envelope text-muted"></i></span>
            <input type="email" id="email" class="form-control form-control-custom border-start-0 ps-1" placeholder="jane.doe@company.com" required style="border-radius: 0 var(--border-radius-sm) var(--border-radius-sm) 0;">
          </div>
          <div class="invalid-feedback d-block mt-1" id="email-error"></div>
        </div>

        <!-- Password -->
        <div class="mb-3">
          <label for="password" class="form-label-custom">Password</label>
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0" style="border-radius: var(--border-radius-sm) 0 0 var(--border-radius-sm); border: 1px solid var(--border-color);"><i class="fa-solid fa-lock text-muted"></i></span>
            <input type="password" id="password" class="form-control form-control-custom border-start-0 border-end-0 ps-1" placeholder="••••••••" required style="border-radius: 0;">
            <button type="button" class="btn btn-outline-secondary border-start-0 bg-white" id="password-toggle" style="border-radius: 0 var(--border-radius-sm) var(--border-radius-sm) 0; border: 1px solid var(--border-color);"><i class="fa-solid fa-eye text-muted"></i></button>
          </div>
          <div class="invalid-feedback d-block mt-1" id="password-error"></div>
          <div class="form-text small text-muted mt-1">Must contain at least 8 characters, with uppercase, lowercase, number, and special character.</div>
        </div>

        <!-- Confirm Password -->
        <div class="mb-4">
          <label for="confirm-password" class="form-label-custom">Confirm Password</label>
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0" style="border-radius: var(--border-radius-sm) 0 0 var(--border-radius-sm); border: 1px solid var(--border-color);"><i class="fa-solid fa-lock text-muted"></i></span>
            <input type="password" id="confirm-password" class="form-control form-control-custom border-start-0 border-end-0 ps-1" placeholder="••••••••" required style="border-radius: 0;">
            <button type="button" class="btn btn-outline-secondary border-start-0 bg-white" id="confirm-password-toggle" style="border-radius: 0 var(--border-radius-sm) var(--border-radius-sm) 0; border: 1px solid var(--border-color);"><i class="fa-solid fa-eye text-muted"></i></button>
          </div>
          <div class="invalid-feedback d-block mt-1" id="confirm-password-error"></div>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn btn-primary-custom w-100 py-2.5 text-white mb-3 d-flex justify-content-center align-items-center" id="btn-signup-submit">
          <span>Create Account</span>
          <span class="spinner-border spinner-border-sm ms-2 d-none" id="signup-spinner" role="status" aria-hidden="true"></span>
        </button>

        <div class="text-center">
          <span class="text-muted small">Already have an account? <a href="login.html" class="text-primary text-decoration-none fw-semibold">Sign In</a></span>
        </div>
      </form>
    </div>
  </div>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Axios & SweetAlert2 CDN -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- API & Auth JS -->
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
</body>
</html>
