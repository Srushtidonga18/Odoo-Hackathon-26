<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AssetFlow - Forgot Password</title>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <!-- SweetAlert2 -->
  <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-bootstrap-4/bootstrap-4.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="text-center mb-4">
        <div class="bg-primary-subtle text-primary rounded-circle p-3 d-inline-flex justify-content-center align-items-center mb-3" style="width: 60px; height: 60px;">
          <i class="fa-solid fa-key fs-3"></i>
        </div>
        <h4 class="fw-bold">Forgot Password?</h4>
        <p class="text-muted">Enter your registered email and we'll send you an OTP to reset your password.</p>
      </div>

      <form id="forgot-form" novalidate>
        <!-- Email Input -->
        <div class="mb-4">
          <label for="email" class="form-label-custom">Email Address</label>
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0" style="border-radius: var(--border-radius-sm) 0 0 var(--border-radius-sm); border: 1px solid var(--border-color);"><i class="fa-solid fa-envelope text-muted"></i></span>
            <input type="email" id="email" class="form-control form-control-custom border-start-0 ps-1" placeholder="name@company.com" required style="border-radius: 0 var(--border-radius-sm) var(--border-radius-sm) 0;">
          </div>
          <div class="invalid-feedback d-block mt-1" id="email-error"></div>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn btn-primary-custom w-100 py-2.5 text-white mb-3 d-flex justify-content-center align-items-center" id="btn-forgot-submit">
          <span>Send OTP Code</span>
          <span class="spinner-border spinner-border-sm ms-2 d-none" id="forgot-spinner" role="status" aria-hidden="true"></span>
        </button>

        <div class="text-center">
          <span class="text-muted small"><a href="login.html" class="text-primary text-decoration-none fw-semibold"><i class="fa-solid fa-arrow-left me-1"></i> Back to Sign In</a></span>
        </div>
      </form>
    </div>
  </div>

  <!-- Axios & SweetAlert2 CDN -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- API & Auth JS -->
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
</body>
</html>
