<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AssetFlow - Verify Email OTP</title>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <!-- SweetAlert2 -->
  <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-bootstrap-4/bootstrap-4.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="text-center mb-4">
        <div class="bg-primary-subtle text-primary rounded-circle p-3 d-inline-flex justify-content-center align-items-center mb-3" style="width: 60px; height: 60px;">
          <i class="fa-solid fa-envelope-open-text fs-3"></i>
        </div>
        <h4 class="fw-bold">Security Verification</h4>
        <p class="text-muted">Enter the 6-digit OTP sent to your email: <br><strong class="text-dark" id="otp-email-display">your email</strong></p>
      </div>

      <form id="otp-form" novalidate>
        <!-- OTP Inputs -->
        <div class="otp-input-container">
          <input type="text" class="otp-digit" maxlength="1" pattern="[0-9]" required>
          <input type="text" class="otp-digit" maxlength="1" pattern="[0-9]" required>
          <input type="text" class="otp-digit" maxlength="1" pattern="[0-9]" required>
          <input type="text" class="otp-digit" maxlength="1" pattern="[0-9]" required>
          <input type="text" class="otp-digit" maxlength="1" pattern="[0-9]" required>
          <input type="text" class="otp-digit" maxlength="1" pattern="[0-9]" required>
        </div>

        <!-- Verify Button -->
        <button type="submit" class="btn btn-primary-custom w-100 py-2.5 text-white mb-3 d-flex justify-content-center align-items-center" id="btn-otp-verify" disabled>
          <span>Verify & Activate</span>
          <span class="spinner-border spinner-border-sm ms-2 d-none" id="otp-spinner" role="status" aria-hidden="true"></span>
        </button>

        <!-- Resend OTP and Timer -->
        <div class="text-center mt-3">
          <p class="text-muted small">Didn't receive the code?</p>
          <button type="button" class="btn btn-link text-primary text-decoration-none fw-semibold p-0" id="btn-otp-resend" disabled>Resend Code</button>
          <div class="text-muted small mt-2" id="otp-timer-container">
            Resend allowed in <span class="fw-bold text-dark" id="otp-timer">60</span>s
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- Axios & SweetAlert2 CDN -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- API & Auth JS -->
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
</body>
</html>
