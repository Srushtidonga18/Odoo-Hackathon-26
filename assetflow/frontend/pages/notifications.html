<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AssetFlow - Notifications</title>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <!-- SweetAlert2 -->
  <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-bootstrap-4/bootstrap-4.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link href="../assets/css/style.css" rel="stylesheet">
  <style>
    /* Styling for read vs unread notifications */
    .notif-card {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      padding: 1.25rem;
      margin-bottom: 1rem;
      transition: var(--transition);
      cursor: pointer;
      position: relative;
    }
    .notif-card:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }
    .notif-card.unread {
      border-left: 4px solid var(--primary-color);
      background-color: rgba(37, 99, 235, 0.02);
    }
  </style>
</head>
<body>

  <!-- Dynamic Loader -->
  <div class="loader-wrapper" id="global-loader">
    <span class="loader"></span>
  </div>

  <div class="app-wrapper">
    <!-- Sidebar Placeholder -->
    <div id="sidebar-placeholder"></div>

    <div class="main-content">
      <!-- Navbar Placeholder -->
      <div id="navbar-placeholder"></div>

      <!-- Main Content Area -->
      <div class="container-fluid p-4">
        
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
          <div>
            <h2 class="fw-bold mb-0">System Notifications</h2>
            <p class="text-muted mb-0">Alerts, updates, and compliance audit notifications</p>
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-primary-custom text-white d-none" id="btn-open-send-notif-modal" data-bs-toggle="modal" data-bs-target="#sendNotificationModal">
              <i class="fa-solid fa-paper-plane me-2"></i>Send Notification
            </button>
            <button class="btn btn-secondary-custom" id="btn-clear-all-notifs">
              <i class="fa-solid fa-trash-can me-2"></i>Clear All
            </button>
          </div>
        </div>

        <div class="row">
          <div class="col-xl-8 col-lg-10 mx-auto">
            <!-- Notification list container -->
            <div id="notifications-list-container">
              <!-- Skeletons -->
              <div class="d-flex flex-column gap-3">
                <div class="skeleton" style="height: 80px; width: 100%;"></div>
                <div class="skeleton" style="height: 80px; width: 100%;"></div>
                <div class="skeleton" style="height: 80px; width: 100%;"></div>
              </div>
            </div>
          </div>
        </div>

      </div>

      <!-- Footer Placeholder -->
      <div id="footer-placeholder"></div>
    </div>
  </div>

  <!-- Send Notification Modal (Admin & Asset Manager Only) -->
  <div class="modal fade" id="sendNotificationModal" tabindex="-1" aria-labelledby="sendNotificationModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content" style="border-radius: var(--border-radius); border: 1px solid var(--border-color); background-color: var(--card-bg);">
        <div class="modal-header border-bottom">
          <h5 class="modal-title fw-bold" id="sendNotificationModalLabel">Send Notification</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <form id="send-notification-form" novalidate>
          <div class="modal-body">
            <!-- Title -->
            <div class="mb-3">
              <label for="notif-title" class="form-label-custom">Title <span class="text-danger">*</span></label>
              <input type="text" id="notif-title" class="form-control form-control-custom" placeholder="e.g. System Maintenance Notice" required>
            </div>
            
            <!-- Message -->
            <div class="mb-3">
              <label for="notif-message" class="form-label-custom">Message <span class="text-danger">*</span></label>
              <textarea id="notif-message" rows="3" class="form-control form-control-custom" placeholder="Type notification details..." required></textarea>
            </div>

            <!-- Type -->
            <div class="mb-3">
              <label for="notif-type" class="form-label-custom">Alert Type</label>
              <select id="notif-type" class="form-select form-control-custom">
                <option value="info">Info (Blue)</option>
                <option value="success">Success (Green)</option>
                <option value="warning">Warning (Yellow/Orange)</option>
              </select>
            </div>

            <!-- Target Type Selection -->
            <div class="mb-3">
              <label for="notif-target-type" class="form-label-custom">Target Audience</label>
              <select id="notif-target-type" class="form-select form-control-custom">
                <option value="all">All Users (Broadcast)</option>
                <option value="role">Specific Role</option>
                <option value="email">Specific User (Email)</option>
              </select>
            </div>

            <!-- Specific Role (Hidden by default) -->
            <div class="mb-3 d-none" id="notif-role-group">
              <label for="notif-target-role" class="form-label-custom">Select Role</label>
              <select id="notif-target-role" class="form-select form-control-custom">
                <option value="Employee">Employee</option>
                <option value="Department Head">Department Head</option>
                <option value="Asset Manager">Asset Manager</option>
                <option value="Admin">Admin</option>
              </select>
            </div>

            <!-- Specific Email (Hidden by default) -->
            <div class="mb-3 d-none" id="notif-email-group">
              <label for="notif-target-email" class="form-label-custom">User Email Address</label>
              <input type="email" id="notif-target-email" class="form-control form-control-custom" placeholder="e.g. arjun@assetflow.com">
            </div>
          </div>
          <div class="modal-footer border-top">
            <button type="button" class="btn btn-secondary-custom" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary-custom text-white d-flex align-items-center" id="btn-submit-notif">
              <span>Send Alert</span>
              <span class="spinner-border spinner-border-sm ms-2 d-none" id="send-notif-spinner" role="status" aria-hidden="true"></span>
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/notifications.js"></script>
</body>
</html>
