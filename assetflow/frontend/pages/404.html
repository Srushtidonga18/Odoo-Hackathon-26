<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AssetFlow - Page Not Found</title>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="auth-wrapper">
    <div class="auth-card text-center py-5" style="max-width: 500px;">
      <div class="mb-4">
        <!-- Glowing Error Icon -->
        <div class="bg-danger-subtle text-danger rounded-circle p-4 d-inline-flex justify-content-center align-items-center mb-4" style="width: 90px; height: 90px; animation: pulse 2s infinite;">
          <i class="fa-solid fa-triangle-exclamation fs-1"></i>
        </div>
        <h1 class="fw-bold mb-2 text-dark-custom" style="font-size: 4rem; color: var(--text-color);">404</h1>
        <h4 class="fw-bold text-dark-custom" style="color: var(--text-color);">Page Not Found</h4>
        <p class="text-muted mt-3">Oops! The page you are looking for does not exist or has been relocated.</p>
      </div>

      <div class="d-flex flex-column gap-2">
        <a href="dashboard.html" class="btn btn-primary-custom text-white py-2.5 w-100" id="btn-404-dashboard">
          Go to Dashboard
        </a>
        <a href="../index.html" class="btn btn-secondary-custom py-2.5 w-100">
          Back to Homepage
        </a>
      </div>
    </div>
  </div>

  <style>
    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
      }
      70% {
        box-shadow: 0 0 0 15px rgba(239, 68, 68, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
      }
    }
  </style>

  <script>
    // Adjust 404 target route based on session state
    document.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('token');
      const dashboardBtn = document.getElementById('btn-404-dashboard');
      if (dashboardBtn) {
        if (!token) {
          // If not logged in, make the primary button point to Login page
          dashboardBtn.textContent = 'Go to Sign In';
          dashboardBtn.href = 'login.html';
        }
      }
    });
  </script>
</body>
</html>
